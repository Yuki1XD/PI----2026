<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="Criar_Projeto.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">


    <title>Criar Projeto</title>

        
</head>
<body>
<main>
    <nav class="barra_lateral">

        <div class="logo">
            <img src="/imgs/Logo2.jpeg">
        </div>

        <ul>
            <li class="items">
                <a href="/tela_incial_aluno">
                    <span class="icon">
                        <i class="fi fi-rr-home"></i>
                    </span>
                    <span class="txt-link">Home</span>
                </a>
            </li>

            <li class="items">
                <a href="/criar_projeto">
                    <span class="icon">
                        <i class="fi fi-rs-add-folder"></i>
                    </span>
                    <span class="txt-link">Criar Projeto</span>
                </a>
            </li>

            <li class="items">
                <a href="#">
                    <span class="icon">
                        <i class="fi fi-rs-folder-edit"></i>
                    </span>
                    <span class="txt-link">Meus Projetos</span>
                </a>
            </li>

            <li class="items">
                <a href="#">
                    <span class="icon">
                        <i class="fi fi-rr-user"></i>
                    </span>
                    <span class="txt-link">Conta</span>
                </a>
            </li>

            <li class="items">
                <a href="#">
                    <span class="icon">
                        <i class="fi fi-rr-settings"></i>
                    </span>
                    <span class="txt-link">Configurações</span>
                </a>
            </li>
        </ul>

    </nav>
    <div class="Bota_imagem">
        <input type="image"> 
    </div>
    
    <div class="Bota_Titulo">
        <input type="text" placeholder="Projeto Nome">
    </div>

    <div class="Bota_Descrição">
        <input type="text" placeholder="Descrição do Projeto">
    </div>

    <div class= "tags">
    </div>


    </div>
</main>
</body>
</html>
