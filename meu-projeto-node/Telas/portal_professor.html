<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Professor</title>

    <link rel="stylesheet" href="../Style/portais.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <script src="../JavaScript/portais.js" defer></script>

</head>
<body>
    
    <!-- Menu lateral -->

    <div  id="menuSide">


        <!-- Informações pessoais do inicio do menu lateral -->

        <div class="viewPerfil">

            <div>
                <img src="../Imagens/24styles-moodeng-bite-bfmh-videoSixteenByNineJumbo1600.jpg" class="imgPerfil">
            </div>

            <div class="namePerfil">

                <h3>Nome do Professor</h3>
                <p>Professor</p>

            </div>

        </div>


        <!-- Botões do menu lateral -->
        
        <div class="tabs">

            <button class="buttonTab" content-id="start"><i class="fi fi-rr-home"></i> Inicio</button>

            <button class="buttonTab" content-id="analyzeProjects"><i class="fi fi-rr-add"></i> Analisar Projetos</button>

            <button class="buttonTab" content-id="analyzedProjects"><i class="fi fi-rr-folder-open"></i> Projetos Analisados</button>

            <button class="buttonTab" content-id="configurations"><i class="fi fi-rr-settings"></i> Configurações</button>

            <button class="buttonTab" content-id="exit" id="exitTabButton"><i class="fi fi-rr-address-card"></i>Sair</button>


        </div> 

    </div>


    <!-- Cabeçalho da pagina -->

    <header>

        <div id="header">

            <div class="menuBurguer">

                <button class="menuButton" id="menuButton">
                    <span>
                        <div class="linha"></div>
                        <div class="linha"></div>
                        <div class="linha"></div>
                    </span>
                </button>

            </div>
            
            <h1 class="nomePainel">Painel Professor</h1>

        </div>

    </header>

    <div id="contentContainerId">


        <!-- Aba de Inicio do Professor - Erik -->

        <div class="contentTab show" id="start">



        </div>


        <!-- Aba de Analisar Projetos do Professor - Gabriel Felipe -->

        <div class="contentTab show" id="analyzeProjects">


        </div>


        <!-- Aba de Projetos Analisados do Professor - Maria Sophia -->

        <div class="contentTab show" id="analyzedProjects">

            

        </div>


        <!-- Aba de Configurações do Professor - Gabriel Felipe -->

        <div class="contentTab show" id="configurationsAdmin">



        </div>

    </div>

</body>
</html>
