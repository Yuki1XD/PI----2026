<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="tela_incial_aluno.css">
    <meta charset="UTF-8">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Inicialização do aluno</title>
</head>
<body>
    <main>
        <nav class="barra_lateral">
            <div class="expandir">
                <i class="fi fi-rs-align-justify"></i>
            </div>
            <ul>
                <li class="items">
                    <a href="#">
                        <span class="icon"><i class="fi fi-rr-home"></i></span>
                        <span class="txt-link">Home</span>
                    </a>
                </li>
                <li class="items">
                    <a href="#">
                        <span class="icon"><i class="fi fi-rs-add-folder"></i></span>
                        <span class="txt-link">Criar Projeto</span>
                    </a>
                </li>
                <li class="items">
                    <a href="#">
                        <span class="icon"><i class="fi fi-rs-folder-edit"></i></span>
                        <span class="txt-link">Meus Projetos</span>
                    </a>
                </li>

                <li class="items">
                    <a href="#">
                        <span class="icon"><i class="fi fi-rr-user"></i></span>
                        <span class="txt-link">Conta</span>
                    </a>
                </li>
            <div>
                <li class="items">
                    <a href="#">
                        <span class="icon"><i class="fi fi-rr-settings"></i></span>
                        <span class="txt-link">Configurações</span>
                    </a>
                </li>
            </div>
            </ul>
        </nav>
    </main>
</body>
</html>
