<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="tela_incial_aluno.css">
    <meta charset="UTF-8">
    <link rel='stylesheet'
    href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Inicialização</title>
</head>

<body>

    <nav class="barra_lateral">

        <div class="logo">
            <img src="/imgs/Logo2.jpeg">
        </div>

        <ul>
            <li class="items">
                <a href="/tela_incial_aluno">
                    <span class="icon">
                        <i class="fi fi-rr-home"></i>
                    </span>
                    <span class="txt-link">Home</span>
                </a>
            </li>

            <li class="items">
                <a href="/criar_projeto">
                    <span class="icon">
                        <i class="fi fi-rs-add-folder"></i>
                    </span>
                    <span class="txt-link">Criar Projeto</span>
                </a>
            </li>

            <li class="items">
                <a href="#">
                    <span class="icon">
                        <i class="fi fi-rs-folder-edit"></i>
                    </span>
                    <span class="txt-link">Meus Projetos</span>
                </a>
            </li>

            <li class="items">
                <a href="#">
                    <span class="icon">
                        <i class="fi fi-rr-user"></i>
                    </span>
                    <span class="txt-link">Conta</span>
                </a>
            </li>

            <li class="items">
                <a href="#">
                    <span class="icon">
                        <i class="fi fi-rr-settings"></i>
                    </span>
                    <span class="txt-link">Configurações</span>
                </a>
            </li>
        </ul>

    </nav>
    <div class="Pesquisa">
        <form action="/buscar" method="GET">
            <input type="search" name="q" placeholder="Pesquise Nome de Projetos">
            <button type="submit">
                <i class="fi fi-rr-search"></i>
            </button>
        </form>
    </div>

</body>

</html>
