<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>

    <link rel="stylesheet" href="/css/Tela_aluno.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/js/portais.js" defer></script>

</head>
<body>


    <!-- Menu lateral -->

    <div  id="menuSide">


        <!-- Informações pessoais do inicio do menu lateral -->

        <div class="viewPerfil">

            <div>
                <img src="/imgs/24styles-moodeng-bite-bfmh-videoSixteenByNineJumbo1600.jpg" class="imgPerfil">
            </div>

            <div class="namePerfil">

                <h3>Nome do Aluno</h3>
                <p>Aluno</p>

            </div>

        </div>


        <!-- Botões do menu lateral -->
        
        <div class="tabs">

            <button class="buttonTab" content-id="start"><i class="fas fa-home"></i> Inicio</button>

            <button class="buttonTab" content-id="addProject"><i class="fas fa-check"></i> Adicionar Projeto</button>

            <button class="buttonTab" content-id="myProjects"><i class="fa-solid fa-folder"></i> Meus Projetos</button>

            <button class="buttonTab" content-id="configurations"><i class="fas fa-home"></i> Configurações</button>

            <button class="buttonTab" content-id="exit"><i class="fas fa-home"></i>Sair</button>


        </div> 

    </div>


    <!-- Cabeçalho da pagina -->

    <header>

        <div id="header">

            <div class="menuBurguer">

                <button class="menuButton" id="menuButton">
                    <span>
                        <div class="linha"></div>
                        <div class="linha"></div>
                        <div class="linha"></div>
                    </span>
                </button>

            </div>
            
            <h1 class="nomePainel">Painel Aluno</h1>

        </div>

    </header>


    <!-- Conteudos presentes em cada aba da pagina -->

    <div class="contentContainer">


        <!-- Conteudo inicial do portal aluno - Erik Melado -->

        <div class="contentTab show" id="start">

            <h1>Inicio</h1>
            
        </div>


        <!-- Conteudo de "Adicionar projeto" do portal aluno - Gabriel Felipe Belo de Moura  -->

        <div class="contentTab show" id="addProject">

            <div class="contentAdd">

                <h1>Adicionar Novo Projeto</h1>

                <form id="formAddProject">

                    <label>Titulo do Projeto</label>
                    <input type="text" class="newProjectInput" id="newProjectTittle" placeholder="Nome do seu Projeto">

                    <label>Foto do Projeto</label>
                    <input type="file" class="newProjectInput" id="newProjectImg">

                    <label>Nome dos Criadores</label>
                    <input type="text" class="newProjectInput" id="newProjecCreators" placeholder="Ex: João Silva, Maria Santos">

                    <label>Data de Postagem</label>
                    <input type="date" class="newProjectInput" id="newProjectDate">

                    <label>Resumo/Apresentação do Projeto</label>
                    <input type="text" class="newProjectInput" id="newProjectApresentation" placeholder="Descreva seu Projeto">

                    <label>Arquivos do Projeto</label>
                    <input type="file" class="newProjectInput" id="newProjectArchives">

                </form>

            </div>
            
        </div>


        <!-- Conteudo de "Meus Projetos" do painel aluno - João Vitor -->

        <div class="contentTab show" id="myProjects">

            <h1>Meus Projetos</h1>
            
        </div>


        <!-- Conteudo de "Configurações" do painel aluno - Gabriel Felipe Belo de Moura -->

        <div class="contentTab show" id="configurations">

            <h1>Configurações</h1>
            
        </div>

        <div class="contentTab show" id="exit">

            <h1>Sair</h1>
            
        </div>

    <div>

</body>
</html>
