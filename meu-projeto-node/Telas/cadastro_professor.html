<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="css/Login.css">
    <script src="/js/cadastro_professor.js" defer></script>
</head>
<body>

    <div class="login-container">
        <h2>Cadastro de Professor</h2>

        <form id="form-cadastro-professor">
            <input type="text" id="nome" placeholder="Seu nome completo" required>
            <input type="text" id="matricula" placeholder="000.000.000-00" required>
            <input type="email" id="email" placeholder="professor@senac.com" required>
            <input type="text" id="especialidade" placeholder="EX: Professor de Programação" required>
            <input type="text" id="turma" placeholder="EX: TI-2024-A, TI-2024-B" required>
            <input type="password" id="senha" placeholder="Digite sua senha" required>

            <button type="submit">Cadastrar</button>
        </form>

        <div class="register">
            <a href="/Login">← Voltar para Login</a>
        </div>
    </div>

</body>
</html>
