<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="css/Login.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>

        <form id="loginForm">
            <input type="text" id="nome" name="nomeAluno" placeholder="Seu nome completo" required>
            <input type="number" id="matricula" name="matriculaAluno" placeholder="Digite sua matrícula" required>
            <input type="text" id="turma" name="turmaAluno" placeholder="Digite sua turma" required>
            <input type="email" id="email" name="emailAluno" placeholder="Digite seu email" required>
            <input type="password" id="senha" name="passwordAluno" placeholder="Digite sua senha" required>
            <input type="password" id="confirmar-senha" name="confirmarPasswordAluno" placeholder="Confirme sua senha" required>
            <button type="submit">cadastrar</button>
        </form>

        <div class="register">
            <a href="/cadastro"><i class="fi fi-rr-arrow-left"></i> Voltar para Login</a>
        </div>

        <div id="mensagem-erro" style="color: red; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <script src="../js/cadastro_aluno.js"></script>

</body>
</html>
